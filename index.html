<div id="root"></div>
<div id="err"></div>

<script>
setTimeout(function(){
  if(document.getElementById('boot')){
    var el=document.getElementById('err');
    if(el){el.style.display='block';el.textContent='تعذّر بدء التطبيق خلال المهلة. جرّب تحديث الصفحة.';}
  }
},20000);
window.addEventListener('error',function(e){
  var el=document.getElementById('err');
  if(el){el.style.display='block';el.textContent='خطأ:\n'+(e.message||e)+'\n'+(e.filename||'')+':'+(e.lineno||'');}
});
</script>

(function(){
  try{
    var cfg={apiKey:"AIzaSyDJYzJ9q71xKGIPMD2t7URFEEzLa3gb1_E",authDomain:"alwateen-lab.firebaseapp.com",projectId:"alwateen-lab",storageBucket:"alwateen-lab.firebasestorage.app",messagingSenderId:"820207126518",appId:"1:820207126518:web:526efe991cc064bfe829d7"};

      delete:function(k){return db.collection("kv").doc(enc(k)).delete().then(function(){return {key:k,deleted:true};});}
    };

    var el=document.getElementById("err");if(el){el.style.display="block";el.textContent="خطأ في تهيئة قاعدة البيانات:\n"+(e&&e.message?e.message:e);}
